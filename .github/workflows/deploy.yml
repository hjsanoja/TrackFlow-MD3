name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Cambia a "master" si tu rama principal se llama así

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies 🔧
        run: npm install

      - name: Build React App 🏗️
        run: npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web/dist # La carpeta con los archivos estáticos listos
          branch: gh-pages # La rama donde se subirá el build
